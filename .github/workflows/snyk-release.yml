name: Run Snyk monitor on releases

on:
  release:
    types: [ published ]

jobs:
  run-snyk-monitor:
    runs-on: ubuntu-latest
    environment: snyk-monitor-releases

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          path: hivemq-file-rbac-extension

      - name: Setup Java
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          distribution: temurin
          java-version: |
            11
            21

      - name: Setup Snyk
        uses: snyk/actions/setup@9adf32b1121593767fc3c057af55b55db032dc04 # v1

      - name: Run Snyk monitor
        run: >
          snyk monitor --configuration-matching=^runtimeClasspath$ --target-reference=${{ github.ref_name }}
          --org=hivemq-releases --project-name=hivemq-file-rbac-extension --remote-repo-url=hivemq-file-rbac-extension
          --project-lifecycle=production -d hivemq-file-rbac-extension
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
